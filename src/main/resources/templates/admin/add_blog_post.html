<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/admin/base_admin::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<title>Thêm bài đăng</title>
</head>

<body>
<section class="hero-section position-relative padding-large"
		 style="background-image: url(/images/banner-image-bg-1.jpg); background-size: cover; background-repeat: no-repeat; background-position: center; height: 250px; padding-top: 75px; padding-bottom: 50px;">
	<div class="hero-content">
		<div class="container">
			<div class="row">
				<div class="text-center">
					<h2>Thêm bài đăng</h2>
					<div class="breadcrumbs">
                        <span class="item">
                            <a href="/admin/">Dashboard > </a>
                        </span>
						<span class="item">
                            <a href="/admin/admin_blog_list">Quản lý bài đăng > </a>
                        </span>
						<span class="item text-decoration-underline">Thêm bài đăng</span>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>

<section>
	<div class="container p-4 mt-3">
		<div class="row">
			<div class="col-md-9 offset-md-1">
				<div class="card card-sh">
					<div class="card-body">
						<h4 class="text-center mb-4" style="color: black;">Thêm bài đăng</h4>

						<th:block th:if="${session.succMsg}">
							<p class="text-success alert alert-success text-center" role="alert">[[${session.succMsg}]]</p>
							<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<th:block th:if="${session.errorMsg}">
							<p class="text-danger alert alert-danger text-center" role="alert">[[${session.errorMsg}]]</p>
							<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<form th:action="@{/admin/savePost}"
							  method="post"
							  enctype="multipart/form-data"
							  style="color: black;"
							  onsubmit="return validateBlogForm();">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

							<div class="mb-3">
								<label class="fw-bold">Tiêu đề <span class="text-danger">*</span></label>
								<input type="text"
									   name="title"
									   class="form-control"
									   required
									   maxlength="255">
							</div>

							<div class="mb-3">
								<label class="fw-bold">Ảnh bìa</label>
								<input type="file"
									   name="file"
									   id="blogThumbnail"
									   class="form-control"
									   accept="image/jpeg,image/png,image/webp"
									   onchange="previewBlogThumbnail(event)">
								<div class="d-flex justify-content-center mt-3">
									<img id="blogThumbnailPreview"
										 src="#"
										 alt="Preview"
										 class="img-thumbnail"
										 style="max-width: 220px; max-height: 220px; display: none; object-fit: cover;">
								</div>
							</div>

							<div class="mb-3">
								<label class="fw-bold">Tác giả <span class="text-danger">*</span></label>
								<input type="text"
									   name="author"
									   class="form-control"
									   required
									   maxlength="100">
							</div>

							<div class="mb-3">
								<label class="fw-bold mb-2">Nội dung bài đăng <span class="text-danger">*</span></label>
								<textarea name="contents"
										  id="contents"
										  rows="10"
										  cols="80"
										  required></textarea>
							</div>

							<div class="d-flex justify-content-between gap-2">
								<a href="/admin/admin_blog_list" class="btn btn-secondary">
									Quay lại
								</a>

								<button type="submit" class="btn btn-primary">
									Lưu bài đăng
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		function previewBlogThumbnail(event) {
			const file = event.target.files[0];
			const preview = document.getElementById('blogThumbnailPreview');

			if (!file) {
				preview.style.display = 'none';
				preview.src = '#';
				return;
			}

			preview.src = URL.createObjectURL(file);
			preview.style.display = 'block';
		}

		function validateBlogForm() {
			if (window.CKEDITOR && CKEDITOR.instances.contents) {
				CKEDITOR.instances.contents.updateElement();
			}

			const title = document.querySelector('input[name="title"]');
			const author = document.querySelector('input[name="author"]');
			const file = document.querySelector('input[name="file"]');
			const contents = document.querySelector('textarea[name="contents"]');

			if (!title.value.trim()) {
				alert('Tiêu đề bài đăng không được để trống.');
				title.focus();
				return false;
			}

			if (!author.value.trim()) {
				alert('Tác giả không được để trống.');
				author.focus();
				return false;
			}

			if (!contents.value.trim()) {
				alert('Nội dung bài đăng không được để trống.');
				return false;
			}

			if (file.files && file.files.length > 0) {
				const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];

				if (!allowedTypes.includes(file.files[0].type)) {
					alert('Chỉ chấp nhận ảnh JPG, PNG hoặc WEBP.');
					file.value = '';
					return false;
				}
			}

			return true;
		}
	</script>

</section>
</body>

</html>
