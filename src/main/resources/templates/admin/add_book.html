<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/admin/base_admin::layout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Thêm sách</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	  rel="stylesheet"
	  integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	  crossorigin="anonymous">

<link rel="stylesheet"
	  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
	  integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
	  crossorigin="anonymous"
	  referrerpolicy="no-referrer" />
</head>

<body>
	<section class="hero-section position-relative padding-large"
			 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
		<div class="hero-content">
			<div class="container">
				<div class="row">
					<div class="text-center">
						<h2>Thêm sách</h2>
						<div class="breadcrumbs">
							<span class="item">
								<a href="/admin/">Dashboard > </a>
							</span><span class="item">
								<a href="/admin/books">Quản lý sách > </a>
							</span>
							<span class="item text-decoration-underline">Thêm sách</span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	<section>
		<div class="container p-4 mt-3" >
			<div class="row">
				<div class="col-md-8 offset-md-2">
					<div class="card card-sh">
						<div class="card-body">
							<form action="/admin/saveBook" method="post" enctype="multipart/form-data" style="color: black;" onsubmit="return validateForm()">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<div class="mb-3">
									<label class="fw-bold">Ảnh sách <span class="text-danger">*</span></label>
									<input type="file"
										   name="file"
										   class="form-control mb-2"
										   accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"
										   onchange="previewImage(event)"
										   required>
									<div id="previewImage" class="d-flex justify-content-center">
										<img id="preview" src="#" alt="Preview" style="max-width: 200px; display: none;" class="img-thumbnail">
									</div>
								</div>
								<div class="row">
									<div class="col-md-6 mb-3">
										<label class="fw-bold">Tên sách <span class="text-danger">*</span></label>
										<input type="text" name="bookName" class="form-control" required>
									</div>
									<div class="col-md-6 mb-3">
										<label class="fw-bold">Tác giả <span class="text-danger">*</span></label>
										<input type="text" name="author" class="form-control" required>
									</div>
								</div>
								<div class="mb-3">
									<label class="fw-bold">Mô tả</label>
									<!--	<textarea rows="3" cols="" class="form-control" name="description"></textarea>-->
									<textarea name="description" id="description" rows="5" cols="80" class="form-control"></textarea>
								</div>
								<div class="row">
									<div class="col-md-4 mb-3">
										<label class="fw-bold">Giá niêm yết <span class="text-danger">*</span></label>
										<input type="text"
											   name="priceDisplay"
											   class="form-control js-price-input"
											   inputmode="numeric"
											   autocomplete="off"
											   required>

										<input type="hidden" name="price" class="js-price-hidden">
									</div>

									<div class="col-md-4 mb-3">
										<label class="fw-bold">Giảm giá (%) <span class="text-danger">*</span></label>
										<input type="number" name="discount" class="form-control" min="0" max="100" required>
									</div>

									<div class="col-md-4 mb-3">
										<label class="fw-bold">Số lượng <span class="text-danger">*</span></label>
										<input type="number" name="stock" class="form-control" min="1" required>
									</div>
								</div>
								<div class="row">
									<div class="col-md-6 mb-3">
										<label class="fw-bold">Danh mục</label>
										<select class="form-control" name="category">
											<option>Chọn danh mục</option>
<!--											<option th:each="c:${categories}" th:value="${c.name}"></option>-->
											<option th:each="c:${categories}">[[${c.name}]]</option>
										</select>
									</div>

									<div class="col-md-6 mb-3">
										<label class="fw-bold">Nhà xuất bản</label> <select class="form-control" name="publisher">
											<option>Chọn NXB</option>
											<option th:each="p:${publishers}">[[${p.name}]]</option>
										</select>
									</div>
								</div>
								<div class="row">
									<div class="mb-3 col">
										<label class="fw-bold d-block" style="padding-bottom: 10px;">Trạng thái</label>
										<div class="d-flex gap-4">
											<div class="form-check">
												<input class="form-check-input" type="radio" checked value="true" name="isActive">
												<label class="form-check-label">Hiển thị</label>
											</div>

											<div class="form-check">
												<input class="form-check-input" type="radio" name="isActive" value="false">
												<label class="form-check-label">Ẩn</label>
											</div>
										</div>
									</div>
									<div class="mb-3 col">
										<label class="fw-bold">Mã ISBN</label> <input type="text" name="isbn" class="form-control">
									</div>
								</div>

								<button class="btn btn-primary col-md-12">Lưu</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>

</html>
