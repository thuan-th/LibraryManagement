<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/admin/base_admin::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<title>Chỉnh sửa sách</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
	<section class="hero-section position-relative padding-large"
			 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
		<div class="hero-content">
			<div class="container">
				<div class="row">
					<div class="text-center">
						<h2>Chỉnh sửa sách</h2>
						<div class="breadcrumbs">
								<span class="item">
									<a href="/admin/">Dashboard > </a>
								</span><span class="item">
									<a href="/admin/books">Quản lý sách > </a>
								</span>
							<span class="item text-decoration-underline">Chỉnh sửa sách</span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	<section>
		<div class="container p-5 mt-3">
			<div class="row">
				<div class="col-md-8 offset-md-2">
					<div class="card card-sh">
						<th:block th:if="${session.succMsg}">
							<p class="text-success alert alert-success text-center" role="alert">[[${session.succMsg}]]</p>
							<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<th:block th:if="${session.errorMsg}">
							<p class="text-danger text-center  alert alert-danger">[[${session.errorMsg}]]</p>
							<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>
						<div class="card-body">
							<form action="/admin/updateBook" method="post" enctype="multipart/form-data">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<div class="mb-3">
									<label class="fw-bold">Ảnh sách</label>
									<input type="file"
										   name="file"
										   class="form-control"
										   accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"
										   onchange="previewImage(event)">
									<input type="hidden" name="image" th:value="${book.image != null ? book.image : ''}">
								</div>
								<div class="d-flex justify-content-center">
									<div class="mt-1">
										<img id="preview" th:src="@{${book.image != null ? '/uploads/books/' + book.image : '/images/default.jpg'}}" width="200px">
									</div>
								</div>
								<div class="row mt-3">
									<div class="col-md-6 mb-3">
										<input type="hidden" name="id" th:value="${book.id}">
										<div class="mb-3">
											<label class="fw-bold">Tên sách <span class="text-danger">*</span></label>
											<input type="text" name="bookName"
												th:value="${book.bookName}" class="form-control">
										</div>
									</div>
									<div class="col-md-6 mb-3">
										<label class="fw-bold">Tác giả <span class="text-danger">*</span></label>
										<input type="text" name="author" th:value="${book.author}"
											class="form-control">
									</div>
								</div>
								<div class="mb-3">
									<label class="fw-bold">Mô tả</label>
									<!--<textarea rows="3" cols="" class="form-control"
										name="description">[[${book.description}]]</textarea>-->
									<textarea name="description" id="description" rows="5" cols="80" class="form-control">[[${book.description}]]</textarea>
								</div>

								<div class="row">
									<div class="mb-3 col-md-4">
										<label class="fw-bold">Giá niêm yết <span class="text-danger">*</span></label>
										<input type="text"
											   name="priceDisplay"
											   class="form-control js-price-input"
											   inputmode="numeric"
											   autocomplete="off"
											   th:value="${#numbers.formatInteger(book.price, 0, 'POINT')}">

										<input type="hidden"
											   name="price"
											   class="js-price-hidden"
											   th:value="${book.price}">
									</div>
									<div class="mb-3 col-md-4">
										<label class="fw-bold">Giảm giá (%) <span class="text-danger">*</span></label>
										<input type="number" name="discount" th:value="${book.discount}" class="form-control">
									</div>
									<div class="mb-3 col-md-4">
										<label class="fw-bold">Số lượng <span class="text-danger">*</span></label>
										<input type="number" name="stock"
											   th:value="${book.stock}" class="form-control">
									</div>
								</div>
								<div class="row">
									<div class="col-md-6 mb-3">
										<label class="fw-bold">Danh mục</label>
										<select class="form-control" name="category">
											<option>[[${book.category}]]</option>
											<option th:each="c:${categories}">[[${c.name}]]</option>
										</select>
									</div>
									<div class="col-md-6 mb-3">
										<label class="fw-bold">Nhà xuất bản</label> <select class="form-control" name="publisher">
										<option>[[${book.publisher}]]</option>
										<option th:each="p:${publishers}">[[${p.name}]]</option>
									</select>
									</div>
								</div>
								<div class="row">
									<div class="col-md-6 mb-3">
										<label class="fw-bold" style="padding-bottom: 15px;">Trạng thái</label>
										<div class="d-flex gap-4">
											<div class="form-check">
												<input class="form-check-input" type="radio" th:checked="${book.isActive==true}" value="true" name="isActive" id="flexRadioDefault1">
												<label class="form-check-label" for="flexRadioDefault1">Hiển thị</label>
											</div>

											<div class="form-check">
												<input class="form-check-input" type="radio" name="isActive"
													th:checked="${book.isActive==false}" value="false" id="flexRadioDefault2">
												<label class="form-check-label" for="flexRadioDefault2">Ẩn</label>
											</div>

										</div>
									</div>
								<div class="mb-3 col">
									<label class="fw-bold">Mã Isbn</label> <input type="text" name="isbn" th:value="${book.isbn}"
										class="form-control">
								</div>

								</div>
								<button class="btn btn-primary col-md-12">Update</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>

	</section>
</body>

</html>
