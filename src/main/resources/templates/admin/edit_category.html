<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/admin/base_admin::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Edit Category</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
	crossorigin="anonymous">

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
	integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
	crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
	<section class="hero-section position-relative padding-large"
			 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
		<div class="hero-content">
			<div class="container">
				<div class="row">
					<div class="text-center">
						<h2>Chỉnh sửa danh mục</h2>
						<div class="breadcrumbs">
							<span class="item">
								<a href="/admin/">Dashboard > </a>
							</span><span class="item">
								<a href="/admin/category">Quản lý danh mục > </a>
							</span>
							<span class="item text-decoration-underline">Chỉnh sửa danh mục</span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	<section>
		<div class="container-fluid p-5 mt-3">
			<div class="d-flex justify-content-center">
				<div class="">
					<div class="card card-sh">
						<th:block th:if="${session.succMsg}">
							<p class="text-success alert alert-success text-center" role="alert">[[${session.succMsg}]]</p>
							<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>

						<th:block th:if="${session.errorMsg}">
							<p class="text-danger text-center  alert alert-danger">[[${session.errorMsg}]]</p>
							<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
						</th:block>
						<div class="card-body">
							<form action="/admin/updateCategory" method="post"
								enctype="multipart/form-data" style="color: black;">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
								<input type="hidden" name="id" th:value="${category.id}">
								<div class="mb-3">
									<label class="fw-bold">Tên danh mục  <span class="text-danger">*</span></label>
									<input type="text" name="name" th:value="${category.name}" class="form-control">
								</div>

								<div class="mb-3">
									<label class="fw-bold">Trạng thái  <span class="text-danger">*</span></label>

									<div class="form-check">
										<input class="form-check-input" type="radio"
											th:checked="${category.isActive==true}" value="true"
											name="isActive" id="flexRadioDefault1"> <label
											class="form-check-label" for="flexRadioDefault1">
											Hiển thị</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="radio" name="isActive"
											th:checked="${category.isActive==false}" value="false"
											id="flexRadioDefault2"> <label
											class="form-check-label" for="flexRadioDefault2">
											Ẩn</label>
									</div>
								</div>

<!--								<div class="mb-3">-->
<!--									<label>Tải ảnh lên</label> <input type="file" name="file"-->
<!--										class="form-control">-->
<!--								</div>-->
<!--								<img th:src="@{'/images/category_img/'+${category.imageName}}"-->
<!--									width="100px" height="100px">-->
								<button class="btn btn-primary col-md-12 mt-2">Chỉnh sửa</button>
							</form>
						</div>
					</div>
				</div>



			</div>
		</div>
	</section>
</body>
</html>
