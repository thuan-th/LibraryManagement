<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{/admin/base_admin::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Danh sách phản hồi</title>
</head>
<body>
<section class="hero-section position-relative padding-large"
         style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
    <div class="hero-content">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <h2>Danh sách phản hồi</h2>
                    <div class="breadcrumbs">
                        <span class="item">
                            <a href="/admin/">Dashboard > </a>
                        </span>
                        <span class="item text-decoration-underline">Danh sách phản hồi</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section>
    <style>
        .feedback-content-cell {
            max-width: 520px;
            white-space: normal;
            line-height: 1.5;
        }

        .feedback-action-btn {
            min-width: 118px;
            padding: 10px 14px;
            white-space: nowrap;
        }

        .feedback-status-badge {
            min-width: 105px;
            padding: 10px 12px;
            font-size: 13px;
        }

        .feedback-anonymous {
            color: #8a8a8a;
            font-style: italic;
        }
    </style>

    <div class="container-fluid padding-medium" style="width: 90%">
        <th:block th:if="${session.succMsg}">
            <p class="text-success alert alert-success text-center" role="alert">[[${session.succMsg}]]</p>
            <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
        </th:block>

        <th:block th:if="${session.errorMsg}">
            <p class="text-danger alert alert-danger text-center" role="alert">[[${session.errorMsg}]]</p>
            <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
        </th:block>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                Tổng số lượng feedback: [[${totalElements}]]
            </div>
        </div>

        <table class="table table-hover table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th scope="col" class="text-center align-middle fw-bold">Tên</th>
                <th scope="col" class="text-center align-middle fw-bold">Email</th>
                <th scope="col" class="text-center align-middle fw-bold">Nội dung phản hồi</th>
                <th scope="col" class="text-center align-middle fw-bold">Ngày gửi</th>
                <th scope="col" class="text-center align-middle fw-bold">Trạng thái</th>
                <th scope="col" class="text-center align-middle fw-bold"></th>
            </tr>
            </thead>

            <tbody>
            <tr th:if="${feedbacks == null or feedbacks.isEmpty()}">
                <td colspan="6" class="text-center text-muted py-4">
                    Chưa có phản hồi nào.
                </td>
            </tr>

            <tr th:each="feedback : ${feedbacks}">
                <td th:text="${feedback.name}"></td>

                <td>
                    <span th:if="${#strings.isEmpty(feedback.userEmail)}"
                          class="feedback-anonymous">
                        Ẩn danh
                    </span>

                    <span th:unless="${#strings.isEmpty(feedback.userEmail)}"
                          th:text="${feedback.userEmail}">
                    </span>
                </td>

                <td class="feedback-content-cell" th:text="${feedback.content}"></td>

                <td class="text-center"
                    th:text="${feedback.submittedAt != null ? #temporals.format(feedback.submittedAt, 'dd/MM/yyyy HH:mm') : ''}">
                </td>

                <td class="text-center">
                    <span class="badge feedback-status-badge"
                          th:classappend="${feedback.displayed} ? 'bg-success' : 'bg-secondary'"
                          th:text="${feedback.displayed} ? 'Đang hiển thị' : 'Đang ẩn'">
                    </span>
                </td>

                <td class="text-center text-nowrap">
                    <th:block th:if="${feedback.displayed}">
                        <form th:action="@{/admin/feedback/display/{id}(id=${feedback.id})}"
                              method="post"
                              class="m-0"
                              onsubmit="return confirm('Bạn có chắc muốn ẩn feedback này khỏi trang chủ?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="displayed" value="false">

                            <button type="submit" class="btn btn-sm btn-outline-secondary feedback-action-btn">
                                <i class="fa-solid fa-eye-slash me-1"></i>
                                Ẩn
                            </button>
                        </form>
                    </th:block>

                    <th:block th:unless="${feedback.displayed}">
                        <form th:action="@{/admin/feedback/display/{id}(id=${feedback.id})}"
                              method="post"
                              class="m-0"
                              onsubmit="return confirm('Bạn có chắc muốn hiển thị feedback này ở trang chủ?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="displayed" value="true">

                            <button type="submit" class="btn btn-sm btn-primary feedback-action-btn">
                                <i class="fa-solid fa-eye me-1"></i>
                                Hiển thị
                            </button>
                        </form>
                    </th:block>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
