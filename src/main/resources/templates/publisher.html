<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<title>Nhà xuất bản</title>
</head>

<body>
<section class="hero-section position-relative padding-large"
		 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
	<div class="hero-content">
		<div class="container">
			<div class="row">
				<div class="text-center">
					<h2>Nhà xuất bản</h2>
					<div class="breadcrumbs">
						<span class="item">
							<a th:href="@{/}">Trang chủ > </a>
						</span>
						<span class="item text-decoration-underline">Nhà xuất bản</span>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>

<section class="publisher-list-page padding-medium">
	<div class="container">
		<div class="publisher-list-toolbar">
			<div>
				<p class="publisher-list-eyebrow">Đối tác xuất bản</p>
				<h3>Khám phá sách theo nhà xuất bản</h3>
			</div>

			<p class="publisher-list-count" th:if="${publishers != null}">
				<strong>[[${publishers.size()}]]</strong> nhà xuất bản
			</p>
		</div>

		<div class="row g-4 publisher-grid">
			<th:block th:if="${publishers != null and !publishers.isEmpty()}">
				<div class="col-xl-3 col-lg-4 col-md-6" th:each="p : ${publishers}">
					<article class="publisher-list-card">
						<a th:href="@{/books(publisher=${p.name})}" class="publisher-list-link">
							<div class="publisher-list-image-wrap">
								<img loading="lazy"
									 th:src="@{${#strings.isEmpty(p.imageName) ? '/images/default-image.jpg' : (p.imageName.startsWith('http') ? p.imageName : '/uploads/publishers/' + p.imageName)}}"
									 th:alt="${p.name}"
									 class="publisher-list-image">
							</div>

							<div class="publisher-list-body">
								<h4 th:text="${p.name}">Tên nhà xuất bản</h4>

								<span class="publisher-list-action">
									Xem sách
									<i class="fa-solid fa-arrow-right"></i>
								</span>
							</div>
						</a>
					</article>
				</div>
			</th:block>

			<th:block th:unless="${publishers != null and !publishers.isEmpty()}">
				<div class="col-12">
					<div class="publisher-empty-state">
						<i class="fa-solid fa-building-columns"></i>
						<h3>Chưa có nhà xuất bản nào</h3>
						<p>Danh sách nhà xuất bản sẽ được cập nhật sau.</p>
						<a th:href="@{/books}" class="btn btn-primary rounded-pill">
							Quay lại gian hàng sách
						</a>
					</div>
				</div>
			</th:block>
		</div>
	</div>
</section>
</body>

</html>
