<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<title>Book</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
	<section class="hero-section position-relative padding-large"
			 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
		<div class="hero-content">
			<div class="container">
				<div class="row">
					<div class="text-center">
						<h2>Nhà Xuất Bản</h2>
						<div class="breadcrumbs">
							<span class="item">
								<a href="/">Trang chủ > </a>
							</span>
							<span class="item text-decoration-underline">Nhà Xuất Bản</span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
	
	<section id="categories" class="padding-medium">
		<div class="container">
			<div class="row">
				<div class="col-publisher" th:each="p:${publishers}">
					<div class="card mb-4 border-0 rounded-3 position-relative">
						<a th:href="@{'/books?publisher='+${p.name}}">
							<div class="publisher-img-wrapper">
								<img th:src="@{'/uploads/publishers/'+${p.imageName}}" class="img-fluid rounded-3" alt="cart item" style="width: 100%; height: 100%;" loading="lazy">
							</div>
							<div class="publisher-name text-center mt-1 fw-bold fs-5">[[${p.name}]]</div>
						</a>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
