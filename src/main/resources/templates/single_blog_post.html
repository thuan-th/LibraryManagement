<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<title th:text="${post != null ? post.title : 'Bài viết'}">Bài viết</title>
</head>

<body>
<section class="hero-section position-relative padding-large"
		 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
	<div class="hero-content">
		<div class="container">
			<div class="row">
				<div class="text-center">
					<h1>Blog</h1>
					<div class="breadcrumbs">
                        <span class="item">
                            <a href="/">Trang chủ > </a>
                        </span>
						<span class="item">
                            <a href="/blog_list">Blog > </a>
                        </span>
						<span class="item text-decoration-underline">Chi tiết bài viết</span>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>

<section>
	<div class="post-wrap padding-medium overflow-hidden">
		<div class="container">
			<div class="row justify-content-center">
				<main class="col-lg-9 col-xl-8">
					<th:block th:if="${post != null}">
						<article class="blog-detail-card">
							<div class="blog-detail-meta">
								<span class="blog-detail-badge">Blog</span>
								<span th:text="${post.formattedCreatedAt}">Ngày đăng</span>
								<span th:if="${!#strings.isEmpty(post.author)}">
                                    - <span th:text="${post.author}">Tác giả</span>
                                </span>
							</div>

							<h1 class="blog-detail-title" th:text="${post.title}">Tiêu đề bài viết</h1>

							<div class="blog-detail-image-box">
								<img th:src="@{${#strings.isEmpty(post.image) ? '/images/default-image.jpg' : '/uploads/blog/thumbnail/' + post.image}}"
									 alt="Blog thumbnail"
									 class="blog-detail-image">
							</div>

							<div class="blog-content" th:utext="${post.contents}"></div>

							<div class="blog-detail-bottom">
								<a href="/blog_list" class="blog-back-btn">
									Quay lại Blog
								</a>

								<div class="social-links blog-share">
									<span>Chia sẻ đến:</span>
									<ul class="d-flex list-unstyled mb-0">
										<li>
											<a href="#">
												<svg class="facebook">
													<use xlink:href="#facebook"></use>
												</svg>
											</a>
										</li>
										<li>
											<a href="#">
												<svg class="instagram">
													<use xlink:href="#instagram"></use>
												</svg>
											</a>
										</li>
										<li>
											<a href="#">
												<svg class="twitter">
													<use xlink:href="#twitter"></use>
												</svg>
											</a>
										</li>
										<li>
											<a href="#">
												<svg class="linkedin">
													<use xlink:href="#linkedin"></use>
												</svg>
											</a>
										</li>
										<li>
											<a href="#">
												<svg class="youtube">
													<use xlink:href="#youtube"></use>
												</svg>
											</a>
										</li>
									</ul>
								</div>
							</div>
						</article>
					</th:block>

					<th:block th:unless="${post != null}">
						<div class="text-center py-5">
							<h3>Không tìm thấy bài viết</h3>
							<a href="/blog_list" class="btn btn-primary mt-3">Quay lại Blog</a>
						</div>
					</th:block>
				</main>
			</div>
		</div>
	</div>

	<style>
		.blog-detail-card {
			border: 1px solid #eee6df;
			border-radius: 8px;
			background: #fff;
			padding: 34px 38px 36px;
		}

		.blog-detail-meta {
			display: flex;
			align-items: center;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 14px;
			color: #6f625a;
			font-size: 0.95rem;
			line-height: 1.5;
		}

		.blog-detail-badge {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-height: 28px;
			padding: 4px 12px;
			border-radius: 6px;
			background: #f76b73;
			color: #fff;
			font-size: 0.85rem;
			font-weight: 600;
		}

		.blog-detail-title {
			margin-bottom: 28px;
			color: #252525;
			font-size: 2.45rem;
			line-height: 1.18;
			letter-spacing: 0;
		}

		.blog-detail-image-box {
			display: flex;
			align-items: center;
			justify-content: center;
			width: min(560px, 100%);
			margin: 0 auto 34px;
			padding: 14px;
			border: 1px solid #eee6df;
			border-radius: 8px;
			background: #f8f5f1;
		}

		.blog-detail-image {
			max-width: 100%;
			max-height: 360px;
			width: auto;
			height: auto;
			object-fit: contain;
			display: block;
			border-radius: 6px;
		}

		.blog-content {
			color: #2f2f2f;
			font-size: 1.04rem;
			line-height: 1.85;
			text-align: justify;
			text-justify: inter-word;
		}

		.blog-content p {
			margin-bottom: 1.2rem;
		}

		.blog-content h1,
		.blog-content h2,
		.blog-content h3,
		.blog-content h4 {
			margin-top: 2rem;
			margin-bottom: 1rem;
			color: #252525;
			line-height: 1.35;
			letter-spacing: 0;
		}

		.blog-content img {
			max-width: min(620px, 100%);
			max-height: 420px;
			height: auto;
			object-fit: contain;
			display: block;
			margin: 28px auto;
			border-radius: 8px;
		}

		.blog-content blockquote {
			border-left: 4px solid #f76b73;
			padding-left: 18px;
			color: #555;
			font-style: italic;
		}

		.blog-content iframe,
		.blog-content script,
		.blog-content object,
		.blog-content embed {
			display: none !important;
		}

		.blog-detail-bottom {
			margin-top: 42px;
			padding-top: 26px;
			border-top: 1px solid #eee6df;
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 24px;
		}

		.blog-back-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-height: 42px;
			padding: 10px 24px;
			border-radius: 999px;
			background: #f76b73;
			color: #fff;
			text-decoration: none;
			font-size: 0.95rem;
			font-weight: 600;
		}

		.blog-back-btn:hover {
			background: #ec5d66;
			color: #fff;
		}

		.blog-share {
			display: flex;
			align-items: center;
			gap: 14px;
			color: #555;
			font-size: 0.95rem;
		}

		@media (max-width: 767px) {
			.blog-detail-card {
				padding: 24px 20px 26px;
			}

			.blog-detail-title {
				font-size: 2rem;
			}

			.blog-detail-image-box {
				padding: 10px;
			}

			.blog-detail-image {
				max-height: 300px;
			}

			.blog-detail-bottom {
				align-items: flex-start;
				flex-direction: column;
			}
		}
	</style>
</section>
</body>

</html>
