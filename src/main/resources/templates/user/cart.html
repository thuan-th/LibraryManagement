<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<title th:text="${title}">View Book</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
		rel="stylesheet">
</head>

<body>
	<section class="hero-section position-relative padding-large"
			 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
		<div class="hero-content">
			<div class="container">
				<div class="row">
					<div class="text-center">
						<h2>Giỏ hàng</h2>
						<div class="breadcrumbs">
							<span class="item">
								<a href="/">Trang chủ > </a>
							</span>
							<span class="item text-decoration-underline">Giỏ hàng</span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section class="cart padding-medium">
		<div class="container">
			<div class="row">
				<th:block th:if="${session.succMsg}">
					<p class="text-success alert alert-success text-center" role="alert">[[${session.succMsg}]]</p>
					<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
				</th:block>

				<th:block th:if="${session.errorMsg}">
					<p class="text-danger text-center  alert alert-danger">[[${session.errorMsg}]]</p>
					<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
				</th:block>

				<div th:if="${emptyCartMsg != null}" class="alert alert-warning" style="text-align: center;" role="alert">
					<span th:text="${emptyCartMsg}"></span>
				</div>
				   
				<div th:unless="${emptyCartMsg != null}">
				<div class="cart-table"  >
					<div class="cart-header border-bottom border-top">
						<div class="row d-flex text-capitalize">
							<h4 class="col-lg-4 py-3 m-0" style="padding-left: 125px;">Sách</h4>
							<h4 class="col-lg-3 py-3 m-0" style="padding-left: 35px;">Số lượng</h4>
							<h4 class="col-lg-3 py-3 m-0" style="padding-left: 35px;">Giá</h4>
							<h4 class="col-lg-1 py-3 m-0" style="padding-left: 23px;">Tổng</h4>
						</div>
					</div>

					<div class="cart-item border-bottom padding-small" th:each="item,stat : ${items}">
						<div class="row align-items-center">
							<div class="col-lg-4 col-md-3">
								<div class="cart-info d-flex gap-2 flex-wrap align-items-center">
									<div class="col-lg-5">
										<div class="card-image">
											<img th:src="@{${item.book.image != null and item.book.image.startsWith('http') ? item.book.image : '/uploads/books/' + item.book.image}}"
												 class="img-fluid border rounded-3" style="width: 80px; height: 110px; object-fit: cover;" loading="lazy">
										</div>
									</div>
									<div class="col-lg-4">
										<div class="card-detail">
											<h6 class="mt-1 mb-1" style="font-size: 20px;">
												<a th:href="@{'/book/'+${item.book.id}}" style="text-decoration:none; color:inherit;">[[${item.book.bookName}]]</a>
											</h6>
											<div class="card-price">
												<span class="text-primary fw-light" style="font-size: 14px;" data-currency-usd="$2000.00">[[${item.book.author}]]
												</span>
											</div>
										</div>
									</div>
								</div>
							</div>
							<div class="col-lg-6 col-md-7">
								<div class="row d-flex">
									<div class="col-lg-6" style="padding-left: 40px;">
										<div class="product-quantity my-2 my-2" >
											<div class="input-group product-qty align-items-center"
												style="max-width: 150px;">
												<div class="d-flex align-items-center qty-box">

													<button class="qty-btn btn btn-sm" data-type="dec" th:data-id="${item.id}" style="padding: 2px 8px !important; font-size: 15px;">
														<i class="fa-solid fa-minus"></i>
													</button>

													<span class="mx-2 quantity-text" style="font-size: 18px;">[[${item.quantity}]]</span>

													<button class="qty-btn btn btn-sm" data-type="inc" th:data-id="${item.id}" style="padding: 2px 8px !important; font-size: 15px;">
														<i class="fa-solid fa-plus"></i>
													</button>
												</div>
											</div>
										</div>
									</div>
									<div class="col-lg-4">
										<div class="total-price">
											<span class="money fs-2 fw-light text-primary" style="font-size: 18px !important;">[[${item.price}]]</span>
										</div>
									</div>
								</div>
							</div>
							<div class="col-lg-1 col-md-2">
								<div class="cart-cross-outline">
									<div class="total-price">
										<span class="item-total money fs-2 fw-light text-primary" style="font-size: 18px !important; font-weight: 500;">[[${item.totalPrice}]]</span>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
				<div class="cart-totals padding-medium pb-0">
					<h4 class="mb-3">Thanh toán</h4>
					<div class="total-price pb-3">
						<table cellspacing="0" class="table text-capitalize">
							<tbody>
								<tr class="order-total pt-2 pb-2 border-bottom">
									<th>Tạm tính:</th>
									<td data-title="Total">
										<span class="price-amount amount text-primary ps-5 fw-light">
											<bdi>
												<span id="cart-total-price" class="price-currency-symbol"th:text="${#numbers.formatDecimal(totalOrderPrice, 0, 'POINT', 0, 'COMMA')} + 'đ'"></span>
											</bdi>
										</span>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
					<div class="button-wrap d-flex flex-wrap gap-3">
						<a href="/books" class="btn ">Tiếp tục mua sắm</a>
						<a href="/order/checkout" class="btn ">Đặt hàng</a>
					</div>
				</div>
				</div>
			</div>
		</div>
	</section>

</body>
</html>
