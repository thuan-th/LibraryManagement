<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">

<head>
	<meta charset="UTF-8">
	<title th:text="${title}">Thông tin thanh toán</title>
</head>

<body>
<section class="hero-section position-relative padding-medium"
		 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
	<div class="hero-content">
		<div class="container">
			<div class="row">
				<div class="text-center">
					<h2>Thông tin thanh toán</h2>
					<div class="breadcrumbs">
						<span class="item">
							<a th:href="@{/}">Trang chủ > </a>
						</span>
						<span class="item text-decoration-underline">Thông tin thanh toán</span>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>

<section class="checkout-page padding-medium">
	<div class="container">
		<form th:action="@{/order/place}" method="post" class="checkout-form">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

			<div class="row g-5">
				<div class="col-lg-7">
					<div class="checkout-panel">
						<div class="checkout-panel-header">
							<div>
								<p class="checkout-step">Bước 1</p>
								<h3>Thông tin nhận hàng</h3>
							</div>
							<i class="fa-solid fa-location-dot checkout-panel-icon"></i>
						</div>

						<div class="row g-3">
							<div class="col-md-6">
								<label for="lname" class="checkout-label">
									Họ <span class="text-danger">*</span>
								</label>
								<input type="text"
									   id="lname"
									   name="lastName"
									   class="form-control checkout-input"
									   autocomplete="family-name"
									   required>
							</div>

							<div class="col-md-6">
								<label for="fname" class="checkout-label">
									Tên <span class="text-danger">*</span>
								</label>
								<input type="text"
									   id="fname"
									   name="firstName"
									   class="form-control checkout-input"
									   autocomplete="given-name"
									   required>
							</div>

							<div class="col-md-6">
								<label for="phone" class="checkout-label">
									Số điện thoại <span class="text-danger">*</span>
								</label>
								<input type="tel"
									   id="phone"
									   name="mobileNo"
									   class="form-control checkout-input"
									   th:value="${user != null ? user.mobileNumber : ''}"
									   pattern="^(0)[0-9]{9}$"
									   inputmode="numeric"
									   maxlength="10"
									   title="Số điện thoại phải bắt đầu bằng 0 và có 10 chữ số"
									   oninput="this.value = this.value.replace(/[^0-9]/g, '')"
									   autocomplete="tel"
									   required>
							</div>

							<div class="col-md-6">
								<label for="email" class="checkout-label">
									Email <span class="text-danger">*</span>
								</label>
								<input type="email"
									   id="email"
									   name="email"
									   class="form-control checkout-input"
									   th:value="${user != null ? user.email : ''}"
									   autocomplete="email"
									   required>
							</div>

							<div class="col-md-6">
								<label for="city" class="checkout-label">
									Tỉnh/Thành phố <span class="text-danger">*</span>
								</label>
								<select id="city"
										name="city"
										class="form-control checkout-input vietnam-city-select"
										data-ward-select-id="district"
										th:attr="data-selected-city=${user != null ? user.city : ''}"
										required>
									<option value="">Chọn tỉnh/thành phố</option>
								</select>
							</div>

							<div class="col-md-6">
								<label for="district" class="checkout-label">
									Xã/Phường <span class="text-danger">*</span>
								</label>
								<select id="district"
										name="district"
										class="form-control checkout-input"
										th:attr="data-selected-ward=${user != null ? user.state : ''}"
										required
										disabled>
									<option value="">Chọn xã/phường</option>
								</select>
							</div>

							<div class="col-12">
								<label for="address" class="checkout-label">
									Địa chỉ cụ thể <span class="text-danger">*</span>
								</label>
								<input type="text"
									   id="address"
									   name="address"
									   class="form-control checkout-input"
									   th:value="${user != null ? user.address : ''}"
									   autocomplete="street-address"
									   required>
							</div>

							<div class="col-12">
								<label for="note" class="checkout-label">Ghi chú đơn hàng</label>
								<textarea id="note"
										  name="note"
										  class="form-control checkout-input checkout-note"
										  rows="4"
										  placeholder="Ví dụ: Giao giờ hành chính, gọi trước khi giao..."></textarea>
							</div>
						</div>
					</div>

					<div class="checkout-panel mt-4">
						<div class="checkout-panel-header">
							<div>
								<p class="checkout-step">Bước 2</p>
								<h3>Phương thức thanh toán</h3>
							</div>
							<i class="fa-regular fa-credit-card checkout-panel-icon"></i>
						</div>

						<div class="checkout-payment-list">
							<label class="checkout-payment-option">
								<input class="form-check-input"
									   type="radio"
									   name="paymentType"
									   value="vnpay"
									   required>
								<span class="checkout-payment-icon">
									<i class="fa-solid fa-wallet"></i>
								</span>
								<span>
									<strong>Thanh toán qua VNPay</strong>
									<small>Chuyển đến cổng thanh toán VNPay sau khi đặt hàng.</small>
								</span>
							</label>

							<label class="checkout-payment-option">
								<input class="form-check-input"
									   type="radio"
									   name="paymentType"
									   value="COD"
									   required>
								<span class="checkout-payment-icon">
									<i class="fa-solid fa-truck-fast"></i>
								</span>
								<span>
									<strong>Thanh toán khi nhận hàng</strong>
									<small>Thanh toán trực tiếp cho đơn vị giao hàng.</small>
								</span>
							</label>
						</div>
					</div>
				</div>

				<div class="col-lg-5">
					<div class="checkout-summary">
						<div class="checkout-summary-header">
							<h3>Đơn hàng của bạn</h3>
							<span th:if="${items != null}">
								[[${items.size()}]] sản phẩm
							</span>
						</div>

						<div class="checkout-items" th:if="${items != null and !items.isEmpty()}">
							<div class="checkout-item" th:each="item : ${items}">
								<div class="checkout-item-image-wrap">
									<img loading="lazy"
										 th:src="@{${#strings.isEmpty(item.book.image) ? '/images/default-image.jpg' : (item.book.image.startsWith('http') ? item.book.image : '/uploads/books/' + item.book.image)}}"
										 th:alt="${item.book.bookName}"
										 class="checkout-item-image">
								</div>

								<div class="checkout-item-info">
									<h4 th:text="${item.book.bookName}">Tên sách</h4>
									<p>
										Số lượng:
										<span th:text="${item.quantity}">1</span>
									</p>
								</div>

								<div class="checkout-item-price"
									 th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'POINT', 0, 'COMMA')} + 'đ'">
									0đ
								</div>
							</div>
						</div>

						<div class="checkout-total-table">
							<div class="checkout-total-row">
								<span>Giá sản phẩm</span>
								<strong th:text="${#numbers.formatDecimal(orderPrice, 0, 'POINT', 0, 'COMMA')} + 'đ'">
									0đ
								</strong>
							</div>

							<div class="checkout-total-row">
								<span>Phí vận chuyển</span>
								<strong th:text="${#numbers.formatDecimal(20000, 0, 'POINT', 0, 'COMMA')} + 'đ'">
									20.000đ
								</strong>
							</div>

							<div class="checkout-total-row checkout-total-final">
								<span>Tổng thanh toán</span>
								<strong th:text="${#numbers.formatDecimal(totalOrderPrice, 0, 'POINT', 0, 'COMMA')} + 'đ'">
									0đ
								</strong>
							</div>
						</div>

						<button type="submit" class="btn btn-primary checkout-submit-btn">
							Đặt hàng
						</button>

						<p class="checkout-secure-note">
							<i class="fa-solid fa-shield-halved"></i>
							Thông tin đơn hàng của bạn được bảo mật.
						</p>
					</div>
				</div>
			</div>
		</form>

		<script th:src="@{/js/vietnam-address-select.js}"></script>
	</div>
</section>
</body>

</html>
