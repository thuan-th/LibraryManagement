<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::section})}">
<head>
	<meta charset="UTF-8">
	<title th:text="${title}">View Book</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
		rel="stylesheet">
</head>
<body>
	<section class="hero-section position-relative padding-large"
			 style="background-image: url(/images/banner-image-bg-1.jpg);background-size: cover;background-repeat: no-repeat;background-position: center;height: 250px;padding-top: 75px;padding-bottom: 50px;">
		<div class="hero-content">
			<div class="container">
				<div class="row">
					<div class="text-center">
						<h1>Danh sách yêu thích</h1>
						<div class="breadcrumbs">
							<span class="item">
								<a href="/">Trang chủ > </a>
							</span>
							<span class="item text-decoration-underline">Danh sách yêu thích </span>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<section class="single-product padding-large">
		<div class="container">
			<div class="row">
				<th:block th:if="${session.succMsg}">
					<p class="text-success alert alert-success text-center" role="alert">[[${session.succMsg}]]</p>
					<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
				</th:block>

				<th:block th:if="${session.errorMsg}">
					<p class="text-danger text-center  alert alert-danger">[[${session.errorMsg}]]</p>
					<th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
				</th:block>

				<div th:if="${emptyWishListMsg != null}" class="alert alert-warning" style="text-align: center;"
					role="alert">
					<span th:text="${emptyWishListMsg}"></span>
				</div>

				<div th:unless="${emptyWishListMsg != null}">
					<div class="row product-content product-store">
						<div class="col-lg-3 col-md-4 mb-4" th:each="wishlist,w:${wishLists}">
							<div class="card position-relative p-4 border rounded-3">
								<div class="position-absolute">
									<p class="bg-primary py-1 px-3 fs-6 text-white rounded-2">
										-[[${wishlist.book.discount}]]%
									</p>
								</div>
								<div class="d-flex justify-content-center">
									<img th:src="@{${#strings.isEmpty(wishlist.book.image) ? '/images/default-image.jpg' : (wishlist.book.image.startsWith('http') ? wishlist.book.image : '/uploads/books/' + wishlist.book.image)}}"
										class="img-fluid shadow-sm text-center" alt="product item" style="width: 220px; height: 220px;" loading="lazy">
								</div>
								<h6 class="mt-4 mb-0 fw-bold"><a
										th:href="@{'/book/'+${wishlist.book.id}}">[[${wishlist.book.bookName}]]</a>
								</h6>
								<div class="review-content d-flex">
									<p class="my-2 me-2 fs-6 text-black-50">[[${wishlist.book.author}]]</p>

								</div>
								<div class="review-content d-flex">
									<div class="rating-container" th:attr="data-rating=${wishlist.book.averageRating}">
										<div class="rating">
											<span class="rating-unit "><i class="fa-solid fa-star"
													style="font-size: 15px;"></i></span>
											<span class="rating-unit "><i class="fa-solid fa-star"
													style="font-size: 15px;"></i></span>
											<span class="rating-unit "><i class="fa-solid fa-star"
													style="font-size: 15px;"></i></span>
											<span class="rating-unit "><i class="fa-solid fa-star"
													style="font-size: 15px;"></i></span>
											<span class="rating-unit "><i class="fa-solid fa-star"
													style="font-size: 15px;"></i></span>
										</div>
									</div>
								</div>
								<div style="padding-top: 10px ;">
									<span
										class="price text-primary fw-bold mb-2 fs-5">[[${wishlist.book.discountPrice}]]đ</span>
									<del style="padding-left: 5px;">[[${wishlist.book.price}]]đ</del>
								</div>
								<div class="card-concern position-absolute start-0 end-0 d-flex gap-2">
									<th:block th:if="${wishlist.book.stock>0 and wishlist.book.isActive==true}">
										<th:block th:if="${user==null}">
											<a type="button" href="/signin" class="btn btn-dark"
												data-bs-toggle="tooltip" data-bs-placement="top"
												data-bs-title="Tooltip on top">
												<svg class="cart">
													<use xlink:href="#cart"></use>
												</svg>
											</a>

										</th:block>
										<th:block th:unless="${user==null}">
											<button type="button"
													class="btn btn-dark add-to-cart-btn"
													th:data-id="${wishlist.book.id}"
													data-bs-toggle="tooltip"
													data-bs-placement="top"
													data-bs-title="Thêm vào giỏ hàng">
												<svg class="cart">
													<use xlink:href="#cart"></use>
												</svg>
											</button>
										</th:block>
									</th:block>
									<th:block th:unless="${wishlist.book.stock>0}">
										<a type="button" class="btn btn-dark disabled-cart" style="												opacity: 0.5; /* Làm mờ nút */
																					   pointer-events: none; cursor: not-allowed !important;" data-bs-toggle="tooltip"
											data-bs-placement="top" data-bs-title="Tooltip on top">
											<svg class="cart">
												<use xlink:href="#cart"></use>
											</svg>
										</a>
									</th:block>
<!--									<a th:href="@{'/user/deleteWishList/'+${wishlist.id}}"-->
<!--									   class="btn btn-dark"-->
<!--									   onclick="return confirm('Xóa khỏi danh sách yêu thích?')">-->
<!--										<span>-->
<!--											<svg class="wishlist">-->
<!--												<use xlink:href="#close"></use>-->
<!--											</svg>-->
<!--										</span>-->

<!--									</a>-->
									<form th:action="@{/user/wishlist/delete/{id}(id=${wishlist.id})}"
										  method="post"
										  class="d-inline"
										  onsubmit="return confirm('Xoá sách khỏi danh sách yêu thích?')">
										<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

										<button type="submit"
												class="btn btn-dark"
												data-bs-toggle="tooltip"
												data-bs-placement="top"
												data-bs-title="Xóa khỏi danh sách yêu thích">
											<span>
												<svg class="wishlist">
													<use xlink:href="#close"></use>
												</svg>
											</span>
										</button>
									</form>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
